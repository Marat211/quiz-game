<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>🦁 Animal Trivia Quiz for Kids</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Comic Sans MS", "Arial Rounded MT Bold", cursive, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 600px;
        width: 100%;
        padding: 40px;
        animation: slideIn 0.5s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes bounce {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      .emoji-title {
        font-size: 60px;
        margin-bottom: 15px;
        animation: bounce 2s infinite;
      }

      h1 {
        color: #667eea;
        font-size: 2.5rem;
        margin-bottom: 10px;
      }

      .subtitle {
        color: #666;
        font-size: 1.1rem;
      }

      .welcome-section {
        display: none;
      }

      .welcome-section.active {
        display: block;
        animation: slideIn 0.5s ease-out;
      }

      .quiz-section {
        display: none;
      }

      .quiz-section.active {
        display: block;
        animation: slideIn 0.5s ease-out;
      }

      .results-section {
        display: none;
      }

      .results-section.active {
        display: block;
        animation: slideIn 0.5s ease-out;
      }

      .welcome-content {
        text-align: center;
        margin: 30px 0;
      }

      .welcome-content p {
        color: #333;
        font-size: 1.2rem;
        margin: 15px 0;
        line-height: 1.6;
      }

      .progress-bar {
        width: 100%;
        height: 10px;
        background: #e0e0e0;
        border-radius: 10px;
        margin-bottom: 30px;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        width: 0%;
        transition: width 0.3s ease;
      }

      .question-number {
        color: #667eea;
        font-weight: bold;
        font-size: 1rem;
        margin-bottom: 15px;
      }

      .question {
        color: #333;
        font-size: 1.3rem;
        font-weight: bold;
        margin-bottom: 25px;
        line-height: 1.4;
      }

      .question-emoji {
        font-size: 3rem;
        margin-bottom: 15px;
      }

      .options {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin-bottom: 30px;
      }

      @media (max-width: 500px) {
        .options {
          grid-template-columns: 1fr;
        }
      }

      .option {
        padding: 15px 20px;
        background: #f0f0f0;
        border: 3px solid transparent;
        border-radius: 12px;
        cursor: pointer;
        font-size: 1.1rem;
        font-weight: bold;
        color: #333;
        transition: all 0.3s ease;
        font-family: "Comic Sans MS", "Arial Rounded MT Bold", cursive, sans-serif;
      }

      .option:hover {
        background: #e0e7ff;
        border-color: #667eea;
        transform: translateY(-3px);
      }

      .option.selected {
        background: #667eea;
        color: white;
        border-color: #764ba2;
      }

      .option.correct {
        background: #10b981;
        color: white;
        border-color: #059669;
      }

      .option.incorrect {
        background: #ef4444;
        color: white;
        border-color: #dc2626;
      }

      .option:disabled {
        cursor: not-allowed;
      }

      .feedback {
        text-align: center;
        font-size: 1.2rem;
        font-weight: bold;
        margin-bottom: 20px;
        min-height: 30px;
      }

      .feedback.correct {
        color: #10b981;
      }

      .feedback.incorrect {
        color: #ef4444;
      }

      .button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 15px 40px;
        border-radius: 12px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        margin: 10px 5px;
        transition: all 0.3s ease;
        font-family: "Comic Sans MS", "Arial Rounded MT Bold", cursive, sans-serif;
      }

      .button:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
      }

      .button:active {
        transform: scale(0.98);
      }

      .button-group {
        display: flex;
        justify-content: center;
        gap: 15px;
        flex-wrap: wrap;
        margin-top: 20px;
      }

      .results-emoji {
        font-size: 80px;
        text-align: center;
        margin: 20px 0;
        animation: bounce 0.6s ease-in-out;
      }

      .score-display {
        text-align: center;
        margin: 30px 0;
      }

      .score-number {
        font-size: 4rem;
        color: #667eea;
        font-weight: bold;
      }

      .score-text {
        color: #666;
        font-size: 1.2rem;
        margin-top: 10px;
      }

      .results-message {
        text-align: center;
        font-size: 1.3rem;
        color: #333;
        margin: 20px 0;
        font-weight: bold;
        line-height: 1.6;
      }

      .score-breakdown {
        background: #f0f0f0;
        padding: 20px;
        border-radius: 12px;
        margin: 20px 0;
        text-align: center;
      }

      .score-breakdown p {
        color: #666;
        font-size: 1.1rem;
        margin: 10px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="emoji-title">🦁</div>
        <h1>Animal Trivia</h1>
        <p class="subtitle">Test your knowledge about amazing animals!</p>
      </div>

      <!-- Welcome Section -->
      <div class="welcome-section active">
        <div class="welcome-content">
          <p>🎮 Welcome to the Animal Trivia Quiz!</p>
          <p>You'll answer 10 fun questions about animals from around the world.</p>
          <p>Do you have what it takes to become an Animal Expert?</p>
        </div>
        <div class="button-group">
          <button class="button" onclick="startQuiz()">Start Quiz 🚀</button>
        </div>
      </div>

      <!-- Quiz Section -->
      <div class="quiz-section">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="question-number" id="questionNumber"></div>
        <div class="question-emoji" id="questionEmoji"></div>
        <div class="question" id="questionText"></div>
        <div class="feedback" id="feedback"></div>
        <div class="options" id="optionsContainer"></div>
        <div class="button-group">
          <button class="button" id="nextButton" onclick="nextQuestion()" style="display: none;">Next Question →</button>
        </div>
      </div>

      <!-- Results Section -->
      <div class="results-section">
        <div class="results-emoji" id="resultEmoji"></div>
        <div class="score-display">
          <div class="score-number" id="finalScore"></div>
          <div class="score-text">out of 10</div>
        </div>
        <div class="results-message" id="resultMessage"></div>
        <div class="score-breakdown">
          <p id="scoreBreakdown"></p>
        </div>
        <div class="button-group">
          <button class="button" onclick="restartQuiz()">Try Again 🔄</button>
        </div>
      </div>
    </div>

    <script>
      const quizData = [
        {
          emoji: "🦁",
          question: "What is the fastest land animal?",
          options: ["Cheetah", "Greyhound", "Antelope", "Ostrich"],
          correct: 0,
          fact: "Cheetahs can run up to 70 mph!"
        },
        {
          emoji: "🐘",
          question: "How many years do elephants typically live?",
          options: ["30 years", "50 years", "70 years", "40 years"],
          correct: 2,
          fact: "Elephants are one of the longest-living mammals!"
        },
        {
          emoji: "🦒",
          question: "How tall can a giraffe get?",
          options: ["12 feet", "18 feet", "24 feet", "30 feet"],
          correct: 2,
          fact: "A giraffe's neck alone can be 6 feet long!"
        },
        {
          emoji: "🐧",
          question: "Where do most penguin species live?",
          options: ["Arctic", "Antarctica", "Greenland", "Iceland"],
          correct: 1,
          fact: "Penguins are found in the Southern Hemisphere, mostly in Antarctica!"
        },
        {
          emoji: "🐬",
          question: "What do dolphins use to navigate underwater?",
          options: ["Their eyes", "Echolocation", "Magnetic fields", "Sound waves"],
          correct: 1,
          fact: "Dolphins use echolocation to find food and navigate!"
        },
        {
          emoji: "🦅",
          question: "What is the eyesight ability of an eagle compared to humans?",
          options: ["2x better", "4x better", "8x better", "10x better"],
          correct: 2,
          fact: "Eagles have about 8 times better eyesight than humans!"
        },
        {
          emoji: "🐢",
          question: "How old can some sea turtles live?",
          options: ["30 years", "50 years", "80+ years", "100+ years"],
          correct: 2,
          fact: "Some sea turtles can live for over 80 years!"
        },
        {
          emoji: "🦘",
          question: "How far can a kangaroo jump in one leap?",
          options: ["10 feet", "20 feet", "30 feet", "40 feet"],
          correct: 2,
          fact: "Kangaroos can jump up to 30 feet in a single bound!"
        },
        {
          emoji: "🐳",
          question: "What is the largest animal on Earth?",
          options: ["African Elephant", "Giraffe", "Blue Whale", "Hippopotamus"],
          correct: 2,
          fact: "The Blue Whale is the largest animal ever known to exist!"
        },
        {
          emoji: "🦔",
          question: "How many spines does a hedgehog have?",
          options: ["Approximately 500", "Approximately 2,000", "Approximately 5,000", "Approximately 10,000"],
          correct: 2,
          fact: "Hedgehogs have around 5,000 spines on their body!"
        }
      ];

      let currentQuestion = 0;
      let score = 0;
      let answered = false;

      function startQuiz() {
        currentQuestion = 0;
        score = 0;
        answered = false;
        document.querySelector(".welcome-section").classList.remove("active");
        document.querySelector(".quiz-section").classList.add("active");
        showQuestion();
      }

      function showQuestion() {
        const question = quizData[currentQuestion];
        document.getElementById("questionNumber").textContent = `Question ${currentQuestion + 1} of ${quizData.length}`;
        document.getElementById("questionEmoji").textContent = question.emoji;
        document.getElementById("questionText").textContent = question.question;
        document.getElementById("feedback").textContent = "";
        document.getElementById("feedback").className = "feedback";
        document.getElementById("nextButton").style.display = "none";
        answered = false;

        const progress = ((currentQuestion) / quizData.length) * 100;
        document.getElementById("progressFill").style.width = progress + "%";

        const optionsContainer = document.getElementById("optionsContainer");
        optionsContainer.innerHTML = "";

        question.options.forEach((option, index) => {
          const button = document.createElement("button");
          button.className = "option";
          button.textContent = option;
          button.onclick = () => selectAnswer(index);
          optionsContainer.appendChild(button);
        });
      }

      function selectAnswer(index) {
        if (answered) return;

        answered = true;
        const question = quizData[currentQuestion];
        const options = document.querySelectorAll(".option");
        const isCorrect = index === question.correct;

        options.forEach((option, optIndex) => {
          option.disabled = true;
          if (optIndex === question.correct) {
            option.classList.add("correct");
          } else if (optIndex === index && !isCorrect) {
            option.classList.add("incorrect");
          }
        });

        const feedback = document.getElementById("feedback");
        if (isCorrect) {
          score++;
          feedback.textContent = "✅ Correct! " + question.fact;
          feedback.className = "feedback correct";
        } else {
          feedback.textContent = "❌ Incorrect. " + question.fact;
          feedback.className = "feedback incorrect";
        }

        document.getElementById("nextButton").style.display = "inline-block";
      }

      function nextQuestion() {
        currentQuestion++;

        if (currentQuestion < quizData.length) {
          showQuestion();
        } else {
          showResults();
        }
      }

      function showResults() {
        document.querySelector(".quiz-section").classList.remove("active");
        document.querySelector(".results-section").classList.add("active");

        const percentage = Math.round((score / quizData.length) * 100);
        document.getElementById("finalScore").textContent = score;
        document.getElementById("scoreBreakdown").textContent = `You got ${percentage}% correct!`;

        let message = "";
        let emoji = "";

        if (score === 10) {
          emoji = "🏆";
          message = "Perfect Score! You're an Animal Expert! 🌟";
        } else if (score >= 8) {
          emoji = "🥇";
          message = "Excellent! You really know your animals! 👏";
        } else if (score >= 6) {
          emoji = "🥈";
          message = "Great job! You're an Animal Enthusiast! 🎉";
        } else if (score >= 4) {
          emoji = "🥉";
          message = "Good effort! Keep learning about animals! 📚";
        } else {
          emoji = "📚";
          message = "Nice try! Learn more and try again! 💪";
        }

        document.getElementById("resultEmoji").textContent = emoji;
        document.getElementById("resultMessage").textContent = message;
      }

      function restartQuiz() {
        document.querySelector(".results-section").classList.remove("active");
        document.querySelector(".welcome-section").classList.add("active");
      }
    </script>
  </body>
</html>
